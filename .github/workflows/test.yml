name: AgriTrust Backend Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"
      - run: npm ci
      - run: npm test

  integration:
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb-ha:pg16-latest
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"
      - run: npm ci
      - name: Apply TimescaleDB migrations
        run: psql "$DATABASE_URL" -f src/database/timescale_init.sql
      - name: Run integration test
        run: npx ts-node tests/integration/environmental_logs_integration_test.ts
        env:
          TIMESCALE_SKIP_SETUP: "1"
